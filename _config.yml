title: "On Life & Everything"
author: "Hakan Altun"
description: "Hakan Altun is a lecturer based in İstanbul. Author of Forgetting the Color of Nothingness, The Fragments, and The On Series. Essays and short fiction on perception, memory, and the architectures we build inside ourselves."
url: "https://hakanaltun.io"
baseurl: ""

permalink: /essays/:slug.html

future: true

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

feed:
  show_excerpts: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Hakan Altun"
