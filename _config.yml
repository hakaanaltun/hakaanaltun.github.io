title: "On Life & Everything"
author: "Hakan Altun"
description: "Hakan Altun is a lecturer based in İstanbul. Author of The Fragments. Essays and short fiction about what stays and what doesn't."
url: "https://hakanaltun.io"
baseurl: ""

permalink: /pieces/:slug.html

future: true

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-sitemap

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor
  - scripts

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Hakan Altun"
  # The Google verification stub is a bare static file (no front matter), so
  # jekyll-sitemap can only be told to skip it from here.
  - scope:
      path: "google51b64a9a40664f6d.html"
    values:
      sitemap: false

# --- Added for Jekyll 4 (standalone, no github-pages gem) ---
# Use the modern Sass implementation bundled with Jekyll 4
sass:
  style: compressed
