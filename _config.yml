title: "On Life & Everything"
author: "Hakan Altun"
description: "Hakan Altun is a lecturer based in İstanbul. Author of The Fragments. Essays and short fiction on what stays and what doesn't."
url: "https://hakanaltun.io"
baseurl: ""

permalink: /essays/:slug.html

future: true

markdown: kramdown
kramdown:
  input: GFM

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

feed:
  show_excerpts: false

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Hakan Altun"
