<style>
  :root{
    --fg:    #EDE4CF;
    --muted: rgba(237,228,207,0.62);
    --line:  rgba(237,228,207,0.28);

    --display: 'Cormorant Garamond', Georgia, serif;
    --body:    'EB Garamond', Georgia, serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:#101720; color:var(--fg); font-family:var(--body);
    height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
    transition:background-color 3s linear, color 3s linear;
  }

  .chrome{
    position:relative; display:flex; align-items:center; justify-content:space-between;
    padding:16px 26px; border-bottom:1px solid var(--line); gap:12px;
    transition:opacity .4s ease, border-color .4s ease;
  }
  .masthead{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    text-decoration:none; display:flex; flex-direction:column; align-items:center;
    gap:1px; text-align:center; opacity:.85; transition:opacity .2s;
  }
  .masthead:hover{ opacity:1; }
  .home-brand{ font-family:var(--display); font-style:italic; font-weight:400; font-size:1.1rem; line-height:1.05; color:var(--fg); }
  .home-tagline{ font-family:var(--body); font-style:italic; font-weight:400; font-size:0.8rem; line-height:1.2; color:var(--muted); }

  .icon-btn{
    background:none; border:1px solid var(--line); color:var(--muted);
    width:40px; height:40px; border-radius:8px; cursor:pointer; font-size:17px;
    display:grid; place-items:center; transition:color .2s, border-color .2s;
    margin-left:auto;
  }
  .icon-btn:hover{ color:var(--fg); border-color:var(--muted); }
  .icon-btn:focus-visible{ outline:2px solid var(--fg); outline-offset:2px; }

  .stage{
    flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:24px; gap:0;
  }
  .phase{
    font-family:var(--display); font-style:italic; font-weight:400;
    font-size:clamp(2.6rem, 9vw, 6.5rem); line-height:1.02; letter-spacing:.01em;
  }
  .next{
    margin-top:1rem; font-family:var(--body); font-style:italic;
    color:var(--muted); font-size:clamp(1.05rem, 3vw, 1.6rem); letter-spacing:.02em;
  }
  .times{
    margin-top:3.2rem; display:flex; flex-wrap:wrap; justify-content:center;
    gap:10px 26px; font-size:clamp(0.95rem, 2.4vw, 1.15rem); letter-spacing:.02em;
  }
  .times .t{ color:var(--muted); }
  .times .t b{
    font-weight:400; color:var(--fg);
    font-variant-numeric:lining-nums tabular-nums; font-feature-settings:"tnum" 1,"lnum" 1;
    margin-left:.35em;
  }
  .place{
    margin-top:2rem; font-family:var(--body); font-style:italic;
    color:var(--muted); font-size:0.85rem; letter-spacing:.03em; opacity:.8;
  }

  body.immersive .chrome{ opacity:0; pointer-events:none; border-color:transparent; }
  body.immersive.show-chrome .chrome{ opacity:1; pointer-events:auto; }

  @media (max-width:600px){
    .chrome{ padding:12px 14px; }
    .home-brand{ font-size:1rem; }
    .home-tagline{ font-size:0.74rem; }
    .times{ flex-direction:column; gap:8px; margin-top:2.4rem; }
  }
  @media (orientation:landscape) and (max-height:500px){
    .masthead{ display:none; }
    .chrome{ padding:8px 14px; }
    .times{ margin-top:1.6rem; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; }
  }
</style>

<body>

  <div class="chrome" id="chrome">
    <a class="masthead" href="/" aria-label="On Life &amp; Everything — home">
      <span class="home-brand">On Life &amp; Everything</span>
      <span class="home-tagline">Essays, short fiction, and other writing.</span>
    </a>
    <button class="icon-btn" id="fsBtn" title="Fullscreen" aria-label="Fullscreen">&#10530;</button>
  </div>

  <div class="stage">
    <h1 class="phase" id="phase">&nbsp;</h1>
    <div class="next" id="next"></div>
    <div class="times" id="times"></div>
    <div class="place">&#304;stanbul &middot; 41.0&deg;N 29.0&deg;E &middot; computed in your browser</div>
  </div>

<script>
(function(){
  "use strict";
  var $ = function(s){ return document.querySelector(s); };
  var LAT = 41.015, LNG = 28.979;         /* İstanbul */
  var RAD = Math.PI / 180;
  var IST_OFFSET = 3 * 3600000;            /* Türkiye: UTC+3, sabit */

  var fmtTime = new Intl.DateTimeFormat("en-GB", { hour:"2-digit", minute:"2-digit", timeZone:"Europe/Istanbul" });

  /* ---- sunrise/sunset (Almanac for Computers algorithm, ±1–2 min) ---- */
  function dayOfYearIst(now){
    var s = new Date(now.getTime() + IST_OFFSET);       /* UTC fields = İstanbul wall clock */
    var start = Date.UTC(s.getUTCFullYear(), 0, 0);
    return { n: Math.floor((s.getTime() - start) / 86400000),
             y: s.getUTCFullYear(), mo: s.getUTCMonth(), d: s.getUTCDate() };
  }
  function sunEvent(day, rising, zenith){
    var lngHour = LNG / 15;
    var t = day.n + (((rising ? 6 : 18) - lngHour) / 24);
    var M = (0.9856 * t) - 3.289;
    var L = M + (1.916 * Math.sin(M * RAD)) + (0.020 * Math.sin(2 * M * RAD)) + 282.634;
    L = ((L % 360) + 360) % 360;
    var RA = Math.atan(0.91764 * Math.tan(L * RAD)) / RAD;
    RA = ((RA % 360) + 360) % 360;
    RA = (RA + (Math.floor(L / 90) * 90) - (Math.floor(RA / 90) * 90)) / 15;
    var sinDec = 0.39782 * Math.sin(L * RAD);
    var cosDec = Math.cos(Math.asin(sinDec));
    var cosH = (Math.cos(zenith * RAD) - (sinDec * Math.sin(LAT * RAD))) / (cosDec * Math.cos(LAT * RAD));
    if(cosH > 1 || cosH < -1) return null;
    var H = rising ? 360 - Math.acos(cosH) / RAD : Math.acos(cosH) / RAD;
    H /= 15;
    var T = H + RA - (0.06571 * t) - 6.622;
    var UT = ((T - lngHour) % 24 + 24) % 24;
    var date = new Date(Date.UTC(day.y, day.mo, day.d));
    date.setUTCMinutes(Math.round(UT * 60));
    return date;
  }
  function eventsFor(day){
    return {
      civilDawn: sunEvent(day, true,  96),
      sunrise:   sunEvent(day, true,  90.833),
      sunset:    sunEvent(day, false, 90.833),
      civilDusk: sunEvent(day, false, 96)
    };
  }

  /* ---- current solar altitude (low-precision ephemeris, ±0.3°) ---- */
  function sunAltitude(now){
    var d = (now.getTime() / 86400000) - 10957.5;        /* days since J2000 */
    var g = (357.529 + 0.98560028 * d) * RAD;
    var q = 280.459 + 0.98564736 * d;
    var L = (q + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * RAD;
    var e = (23.439 - 0.00000036 * d) * RAD;
    var sinDec = Math.sin(e) * Math.sin(L);
    var dec = Math.asin(sinDec);
    var RAh = (Math.atan2(Math.cos(e) * Math.sin(L), Math.cos(L)) / RAD) / 15;
    var GMST = ((18.697374558 + 24.06570982441908 * d) % 24 + 24) % 24;
    var lst = ((GMST + LNG / 15) % 24 + 24) % 24;
    var H = ((lst - RAh) * 15 + 540) % 360 - 180;
    var latR = LAT * RAD;
    return Math.asin(Math.sin(latR) * sinDec + Math.cos(latR) * Math.cos(dec) * Math.cos(H * RAD)) / RAD;
  }

  /* ---- sky ramp: altitude → background, and how far the text leans to ink ---- */
  var CREAM = [237,228,207], INK = [47,43,39];
  var STOPS = [   /* [altitude°, [r,g,b], inkMix 0..1] */
    [-30, [ 12, 16, 24], 0],
    [-18, [ 14, 19, 29], 0],
    [-12, [ 23, 32, 48], 0],
    [ -6, [ 44, 58, 82], 0],
    [ -2, [ 98, 84, 84], 0],
    [  0, [140,104, 79], 0],
    [  5, [178,155,124], 0.55],
    [ 12, [186,205,212], 1],
    [ 40, [196,216,223], 1]
  ];
  function lerp(a, b, f){ return a + (b - a) * f; }
  function skyAt(alt){
    if(alt <= STOPS[0][0]) return STOPS[0];
    for(var i = 1; i < STOPS.length; i++){
      if(alt <= STOPS[i][0]){
        var lo = STOPS[i-1], hi = STOPS[i];
        var f = (alt - lo[0]) / (hi[0] - lo[0]);
        return [alt,
          [ Math.round(lerp(lo[1][0], hi[1][0], f)),
            Math.round(lerp(lo[1][1], hi[1][1], f)),
            Math.round(lerp(lo[1][2], hi[1][2], f)) ],
          lerp(lo[2], hi[2], f)];
      }
    }
    return STOPS[STOPS.length - 1];
  }
  function mix(a, b, f){
    return "rgb(" + Math.round(lerp(a[0], b[0], f)) + "," + Math.round(lerp(a[1], b[1], f)) + "," + Math.round(lerp(a[2], b[2], f)) + ")";
  }

  function phaseName(alt, now, ev){
    var noon = (ev.sunrise && ev.sunset) ? (ev.sunrise.getTime() + ev.sunset.getTime()) / 2 : null;
    var morning = noon != null ? now.getTime() < noon : false;
    if(alt >= 0)  return "Daylight";
    if(alt >= -6) return morning ? "Civil dawn" : "Civil dusk";
    if(alt >= -12) return "Nautical twilight";
    if(alt >= -18) return "Astronomical twilight";
    return "Night";
  }

  function ago(ms){
    var m = Math.round(ms / 60000);
    var h = Math.floor(m / 60); m %= 60;
    if(h > 0) return h + " h " + (m > 0 ? m + " m" : "");
    return m + " m";
  }

  var phaseEl = $("#phase"), nextEl = $("#next"), timesEl = $("#times");
  var lastPhase = null, lastTimesKey = null;

  function render(){
    var now = new Date();
    var day = dayOfYearIst(now);
    var ev = eventsFor(day);
    var alt = sunAltitude(now);

    /* sky */
    var sky = skyAt(alt);
    document.body.style.backgroundColor = "rgb(" + sky[1].join(",") + ")";
    document.body.style.color = mix(CREAM, INK, sky[2]);
    var mutedA = sky[2] > 0.5 ? "rgba(47,43,39,0.62)" : "rgba(237,228,207,0.62)";
    var lineA  = sky[2] > 0.5 ? "rgba(47,43,39,0.28)" : "rgba(237,228,207,0.28)";
    document.documentElement.style.setProperty("--muted", mutedA);
    document.documentElement.style.setProperty("--line", lineA);
    document.documentElement.style.setProperty("--fg", mix(CREAM, INK, sky[2]));

    /* phase word */
    var name = phaseName(alt, now, ev);
    if(name !== lastPhase){ lastPhase = name; phaseEl.textContent = name; }

    /* next event */
    var order = [
      [ev.civilDawn, "Civil dawn"],
      [ev.sunrise,   "Sunrise"],
      [ev.sunset,    "Sunset"],
      [ev.civilDusk, "Civil dusk"]
    ];
    var next = null, nextLabel = "";
    for(var i = 0; i < order.length; i++){
      if(order[i][0] && order[i][0].getTime() > now.getTime()){ next = order[i][0]; nextLabel = order[i][1]; break; }
    }
    if(!next){
      var tomorrow = dayOfYearIst(new Date(now.getTime() + 86400000));
      var ev2 = eventsFor(tomorrow);
      if(ev2.civilDawn){ next = ev2.civilDawn; nextLabel = "Civil dawn"; }
    }
    nextEl.textContent = next ? nextLabel + " in " + ago(next.getTime() - now.getTime()) : "";

    /* today's times */
    var key = day.y + "-" + day.mo + "-" + day.d;
    if(key !== lastTimesKey){
      lastTimesKey = key;
      var rows = [["Civil dawn", ev.civilDawn], ["Sunrise", ev.sunrise], ["Sunset", ev.sunset], ["Civil dusk", ev.civilDusk]];
      var html = "";
      for(var j = 0; j < rows.length; j++){
        if(!rows[j][1]) continue;
        html += '<span class="t">' + rows[j][0] + "<b>" + fmtTime.format(rows[j][1]) + "</b></span>";
      }
      timesEl.innerHTML = html;
    }
  }

  /* ---- fullscreen, as on /clock/ ---- */
  var docEl = document.documentElement, fakeFs = false;
  function nativeFsElement(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
  function requestFs(){
    var fn = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
    if(fn){ try{ fn.call(docEl); return true; }catch(e){} }
    return false;
  }
  function exitFs(){
    var fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(fn){ try{ fn.call(document); }catch(e){} }
  }
  function syncImmersive(){
    var on = !!nativeFsElement() || fakeFs;
    document.body.classList.toggle("immersive", on);
    if(on) pokeChrome();
  }
  $("#fsBtn").addEventListener("click", function(){
    if(nativeFsElement()){ exitFs(); return; }
    if(fakeFs){ fakeFs = false; syncImmersive(); return; }
    if(!requestFs()){ fakeFs = true; syncImmersive(); }
  });
  document.addEventListener("fullscreenchange", syncImmersive);
  document.addEventListener("webkitfullscreenchange", syncImmersive);
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && fakeFs){ fakeFs = false; syncImmersive(); } });
  var chromeTimer;
  function pokeChrome(){
    document.body.classList.add("show-chrome");
    clearTimeout(chromeTimer);
    chromeTimer = setTimeout(function(){ document.body.classList.remove("show-chrome"); }, 2800);
  }
  ["mousemove","touchstart","keydown"].forEach(function(ev){
    document.addEventListener(ev, function(){ if(document.body.classList.contains("immersive")) pokeChrome(); });
  });

  /* ---- run ---- */
  render();
  setInterval(render, 30000);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) render(); });
})();
</script>
</body>
</html>
