<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#FAF8F4"/>

  <g opacity="0.12">
    <circle cx="250" cy="300" r="180" fill="none" stroke="#2F3D3C" stroke-width="2"/>
    <circle cx="250" cy="300" r="120" fill="none" stroke="#206060" stroke-width="1"/>
    <circle cx="250" cy="300" r="10" fill="#8A8279"/>
    
    <line x1="50" y1="800" x2="500" y2="800" stroke="#8A8279" stroke-width="2"/>
    <line x1="50" y1="820" x2="450" y2="820" stroke="#206060" stroke-width="1"/>
    
    <rect x="150" y="600" width="150" height="150" fill="none" stroke="#2F3D3C" stroke-width="1" transform="rotate(45 225 675)"/>

    <text x="100" y="150" font-family="Georgia, serif" font-style="italic" font-size="42" fill="#206060" letter-spacing="2">perceiving</text>
    <text x="350" y="450" font-family="Georgia, serif" font-style="italic" font-size="56" fill="#2F3D3C" letter-spacing="4" transform="rotate(-90 350 450)">corridors</text>
    <text x="120" y="550" font-family="Georgia, serif" font-style="italic" font-size="38" fill="#8A8279">forgetting</text>
    <text x="450" y="850" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#206060" transform="rotate(90 450 850)">silence</text>
    <text x="200" y="950" font-family="Georgia, serif" font-style="italic" font-size="48" fill="#2F3D3C">beauty</text>
  </g>

  <g opacity="0.12">
    <circle cx="1670" cy="750" r="180" fill="none" stroke="#2F3D3C" stroke-width="2"/>
    <circle cx="1670" cy="750" r="120" fill="none" stroke="#8A8279" stroke-width="1"/>
    <circle cx="1670" cy="750" r="10" fill="#206060"/>

    <line x1="1420" y1="200" x2="1870" y2="200" stroke="#206060" stroke-width="2"/>
    <line x1="1470" y1="180" x2="1870" y2="180" stroke="#8A8279" stroke-width="1"/>
    
    <path d="M1520,400 L1720,400 L1620,600 Z" fill="none" stroke="#2F3D3C" stroke-width="1"/>

    <text x="1450" y="140" font-family="Georgia, serif" font-style="italic" font-size="48" fill="#2F3D3C" letter-spacing="3">lying</text>
    <text x="1750" y="350" font-family="Georgia, serif" font-style="italic" font-size="36" fill="#8A8279" letter-spacing="2" transform="rotate(90 1750 350)">longing</text>
    <text x="1420" y="500" font-family="Georgia, serif" font-style="italic" font-size="52" fill="#206060">forgiveness</text>
    <text x="1500" y="900" font-family="Georgia, serif" font-style="italic" font-size="32" fill="#8A8279" transform="rotate(-90 1500 900)">the walls</text>
    <text x="1550" y="950" font-family="Georgia, serif" font-style="italic" font-size="42" fill="#2F3D3C">nothingness</text>
  </g>
</svg>
