# _data/tools.yml — the single catalogue of the instruments.
#
# Everything tool-related is generated from this file:
#   * /tools/ — the visible list and its ItemList schema (tools.html)
#   * the "More instruments" paragraph on every tool page (_includes/tool-links.html)
#   * the service worker precache list (sw.js)
#   * the homepage instruments line (index.html)
#
# Adding an instrument = one entry here + its page at /<slug>/index.html.
# (Then bump CACHE in sw.js so returning visitors pick up the new list.)
#
# Fields:
#   slug      folder name; the page lives at /<slug>/
#   name      display name, as on /tools/
#   listname  the long name used in the ItemList schema on /tools/
#   card      the description under the name on /tools/
#   line      the prose phrase used in "More instruments" links
#   related   exactly three slugs, in order, for the links paragraph
#   post      optional — one piece from the writing: { url, title }

- slug: clock
  name: The Clock
  listname: "The Clock—Fullscreen Clock, Countdown, Stopwatch & Pomodoro"
  card: "A fullscreen clock, countdown, stopwatch and pomodoro. Large numerals, an analog view&mdash;made for classrooms, exams and focused work."
  line: "a fullscreen clock with pomodoro"
  related: [prompt, lots, noise]

- slug: write
  name: The Page
  listname: "The Page—A Blank Page for Distraction-Free Writing"
  card: "A blank page to write on. Garamond type, a word count, fullscreen, autosave&mdash;and nothing else."
  line: "a blank page to write on"
  related: [draw, words, clean]
  post: { url: "/pieces/written-in-ink.html", title: "Written in Ink" }

- slug: draw
  name: The Draw
  listname: "The Draw—A Blank Page to Draw On"
  card: "A blank page to draw on&mdash;mouse, finger or stylus, with pressure. Four inks, undo, autosave and a PNG download."
  line: "a blank page to draw on"
  related: [write, marks, words]

- slug: words
