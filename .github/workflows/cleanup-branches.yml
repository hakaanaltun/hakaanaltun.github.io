name: Cleanup stale branches

# Gecici temizlik workflow'u: main disindaki tum branchleri siler.
# Elle calistirilir (Actions sekmesi > Run workflow). Is bitince bu dosya kaldirilacak.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete all branches except main
        run: |
          set -uo pipefail
          mapfile -t BRANCHES < <(git ls-remote --heads origin \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | grep -vx main \
            | sort -u)
          echo "Silinecek branch sayisi: ${#BRANCHES[@]}"
          if [ "${#BRANCHES[@]}" -eq 0 ]; then
            echo "Silinecek branch yok."
            exit 0
          fi
          deleted=0
          failed=0
          batch=()
          flush() {
            [ "${#batch[@]}" -eq 0 ] && return
            if git push origin --delete "${batch[@]}"; then
              deleted=$((deleted + ${#batch[@]}))
              echo "  -> ${#batch[@]} branch silindi (toplam $deleted)"
            else
              failed=$((failed + ${#batch[@]}))
              echo "  -> HATA: bu grup silinemedi"
            fi
            batch=()
          }
          for b in "${BRANCHES[@]}"; do
            batch+=("$b")
            if [ "${#batch[@]}" -ge 50 ]; then
              flush
            fi
          done
          flush
          echo "==================================="
          echo "Toplam silinen: $deleted, basarisiz: $failed"
          echo "Kalan uzak branch sayisi (main dahil):"
          git ls-remote --heads origin | wc -l
          if [ "$failed" -gt 0 ]; then
            exit 1
          fi
