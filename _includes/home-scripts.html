<script>
    (function(){
      'use strict';

      var heroQuotes = [
        {s:'The Fragments',t:'First, there was Symmetry.'},
        {s:'The Fragments',t:'Then matter hesitated. It disobeyed.'},
        {s:'The Fragments',t:'You will give pulls like this many names, later. Gravity among them.'},
        {s:'The Fragments',t:'I gave it another name first.\nNostalgia.'},
        {s:'The Fragments',t:'The first cell tasted fear.'},
        {s:'The Fragments',t:'None, uncle. They’re all A’s.'},
        {s:'The Fragments',t:'They must know what they’re doing.'},
        {s:'The Fragments',t:'You merged the request without my approval.'},
        {s:'The Fragments',t:'I had been the oldest person in that café. I had also been the youngest.'},
        {s:'The Fragments',t:'Don’t do anything. Just wait.'},
        {s:'The Fragments',t:'It’s handled.'},
        {s:'The Fragments',t:'He looked at the clean glass. He reached out and tightened the faucet handle, though no water was dripping.'},
        {s:'The Fragments',t:'Merge is not a decision. It only resembles one from within sequence.'},
        {s:'The Fragments',t:'Evladiyelik, as my father would say.'},
        {s:'The Fragments',t:'The cycle closes this way.'},
        {s:'The Best Ideas Come When You Let Go',t:'New ideas need empty spaces to pass through.'},
        {s:'The Best Ideas Come When You Let Go',t:'We think it’s working the least when actually it’s working the hardest.'},
        {s:'The Empathy Paradox',t:'My friend’s life is a map. My own life is a forest.'},
        {s:'The Empathy Paradox',t:'I just need a silence that doesn’t ask questions.'},
        {s:'It Is Either from Love or Fear',t:'Fear is not stupid. Fear is the most intelligent thing inside us.'},
        {s:'It Is Either from Love or Fear',t:'Love is the only thing I have ever done that felt like it was actually mine.'},
        {s:'Why Do Unfinished Things Haunt Us?',t:'Some unfinished things are noise. Others are a compass.'},
        {s:'Why Do Unfinished Things Haunt Us?',t:'They don’t stop because they’re not supposed to.'},
        {s:'Jung’s Golden Shadow',t:'We spend the first twenty years of our lives deciding what to lock away in that baggage.'},
        {s:'Jung’s Golden Shadow',t:'Those who open it are terrified at first, but then they become lighter.'},
        {s:'Our Defense Mechanisms',t:'The system I’d built to keep pain out was keeping everything else out too.'},
        {s:'Our Defense Mechanisms',t:'The fortress that was supposed to protect me slowly turns into a damp, moldy cell.'},
        {s:'Will AI Be Enough for Us?',t:'Life is about who we fall with and whose hand we hold to get back up.'},
        {s:'Will AI Be Enough for Us?',t:'No, stop. I want to feel this myself.'},
        {s:'Why Do We Say Hello?',t:'Receiving a reaction is the most concrete proof of saying I am here and I exist.'},
        {s:'Why Do We Say Hello?',t:'Even being scolded can feel better than indifferent silence.'},
        {s:'On Lying',t:'A lie carries no physical weight and still expands like a black hole.'},
        {s:'On Lying',t:'Honesty was always available. Most of us knew that.'},
        {s:'On Perceiving',t:'The moment perception becomes uncomfortable is the moment it might be getting accurate.'},
        {s:'On Perceiving',t:'The buildings we never question are the ones we should.'},
        {s:'On Looking',t:'Everyone moved toward the stage.\nThe seats emptied behind them.'},
        {s:'On Looking',t:'It’s hard to obsess over who’s watching when you’ve just been watching someone else.'},
        {s:'On Forgiveness',t:'The debt sits untouched in the archive. You just stop trying to collect it.'},
        {s:'On Forgiveness',t:'To truly forgive, you need the towering arrogance of a god.'},
        {s:'On Keeping',t:'The danger of surrender lay in who you became inside the disarray.'},
        {s:'On Keeping',t:'Existence, quietly, refuses to come undone.'},
        {s:'On Longing',t:'Back then nothing had to be enough.'},
        {s:'On Longing',t:'You see with what you have learned. What you have learned is your prison.'},
        {s:'On Silence',t:'He breathed—slow, even, entirely without effort.'},
        {s:'On Silence',t:'Then I closed my eyes and let the dark simply be the dark.'},
        {s:'Collateral',t:'The best of what’s possible, he tells himself, taking the keys.'},
        {s:'Collateral',t:'The word sits between them. Collateral. Neither of them touches it.'},
        {s:'The Cost',t:'I made coffee. Very quietly. Like a thief in my own life.'},
        {s:'The Cost',t:'She said this almost irritably, as if love had once again failed to choose a side.'},
        {s:'None of Us Are',t:'I understood the sentence.\nMy body understood the opposite.'},
        {s:'None of Us Are',t:'The hunger to remain apart had already poisoned the pleasure.'}
      ];

      var hq = document.getElementById('hero-quote');
      var qs = document.getElementById('hero-quote-source');
      var prevBtn = document.getElementById('quote-prev');
      var nextBtn = document.getElementById('quote-next');
      var qCard = document.querySelector('.hero-quote-card');
      var qNav = document.querySelector('.quote-nav');
      var currentIdx = -1;
      var history = [];
      var rotateTimer = null;
      var navHideTimer = null;
      var ROTATE_DELAY = 30000;

      function randomIndex(except){
        if(heroQuotes.length < 2) return 0;
        var idx;
        do { idx = Math.floor(Math.random() * heroQuotes.length); } while(idx === except);
        return idx;
      }

      function render(idx, pushHistory){
        if(!hq || !qs || !heroQuotes[idx]) return;
        if(pushHistory && currentIdx > -1) history.push(currentIdx);
        currentIdx = idx;
        hq.style.opacity = '0';
        qs.classList.remove('visible');
        setTimeout(function(){
          var pick = heroQuotes[idx];
          hq.innerHTML = '';
          pick.t.split('\n').forEach(function(line,lineIndex){
            if(lineIndex) hq.appendChild(document.createElement('br'));
            line.split(/(\s+)/).forEach(function(part,partIndex){
              if(part.trim()==='') { hq.appendChild(document.createTextNode(part)); return; }
              var span = document.createElement('span');
              span.className = 'hero-quote-word';
              span.textContent = part;
              hq.appendChild(span);
              setTimeout(function(){ span.classList.add('word-visible'); }, 80 + partIndex * 35 + lineIndex * 220);
            });
          });
          qs.innerHTML = '— <i>' + pick.s + '</i>';
          setTimeout(function(){ qs.classList.add('visible'); }, 650);
          hq.style.opacity = '1';
          schedule();
        }, 260);
      }

      function schedule(){
        clearTimeout(rotateTimer);
        rotateTimer = setTimeout(function(){ render(randomIndex(currentIdx), true); }, ROTATE_DELAY);
      }

      function showNav(){
        if(!qNav) return;
        qNav.classList.add('quote-nav-visible');
        clearTimeout(navHideTimer);
        navHideTimer = setTimeout(function(){ qNav.classList.remove('quote-nav-visible'); }, 2200);
      }

      if(prevBtn) prevBtn.addEventListener('click', function(e){
        e.preventDefault(); e.stopPropagation(); showNav();
        var previous = history.length ? history.pop() : randomIndex(currentIdx);
        render(previous, false);
      });

      if(nextBtn) nextBtn.addEventListener('click', function(e){
        e.preventDefault(); e.stopPropagation(); showNav();
        render(randomIndex(currentIdx), true);
      });

      if(qCard) qCard.addEventListener('click', function(e){
        if(e.target.closest('.quote-nav-btn')) return;
        showNav();
      });

      // Hide quote nav when tapping outside the card (mobile)
      document.addEventListener('touchstart', function(e){
        if(!qNav || !qCard) return;
        if(!qCard.contains(e.target)){
          qNav.classList.remove('quote-nav-visible');
          clearTimeout(navHideTimer);
        }
      });

      if(hq) render(randomIndex(-1), false);

      if ('IntersectionObserver' in window) {
        var revealObs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('revealed');
              revealObs.unobserve(entry.target);
            }
          });
        }, {rootMargin: '0px 0px -40px 0px'});

        var lineObs = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('line-drawn');
              lineObs.unobserve(entry.target);
            }
          });
        }, {rootMargin: '0px 0px -40px 0px'});

        document.querySelectorAll('.scroll-reveal').forEach(function(el) { revealObs.observe(el); });
        document.querySelectorAll('section').forEach(function(el) { lineObs.observe(el); });
        document.querySelectorAll('.essay-section-divider').forEach(function(el) { lineObs.observe(el); });
      }

      function initClickToLoadVideo(wrapperId, videoUrl) {
        var wrapper = document.getElementById(wrapperId);
        if (!wrapper) return;
        wrapper.addEventListener('click', function() {
          var iframe = document.createElement('iframe');
          iframe.src = videoUrl;
          iframe.setAttribute('allowfullscreen', '');
          iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
          iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;top:0;left:0';
          wrapper.style.position = 'relative';
          while (wrapper.firstChild) wrapper.removeChild(wrapper.firstChild);
          wrapper.appendChild(iframe);
        });
      }
      initClickToLoadVideo('moris-video-wrapper', 'https://www.youtube.com/embed/hBpAOitmBNw?si=AEhHGFWstiHfFR83&autoplay=1');
    })();
    </script>
