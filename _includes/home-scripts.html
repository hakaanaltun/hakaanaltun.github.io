    <script>
    (function(){
        'use strict';
        var heroQuotes=[
            //—Forgetting the Color of Nothingness (16)
            {t:"I was hungry for existence.\nHe was in love with nothingness.",s:"Forgetting the Color of Nothingness"},
            {t:"Nostalgia.\nThat force you call gravity was actually the effort of separated pieces remembering they were once One.",s:"Forgetting the Color of Nothingness"},
            {t:"I used to think time was my friend; it turned out to be my executioner.",s:"Forgetting the Color of Nothingness"},
            {t:"And the first lesson of existence.\nEven the brightest fire cannot burn forever.",s:"Forgetting the Color of Nothingness"},
            {t:"I knew heat, but I didn\u2019t know what it meant to burn.\nI knew gravity, but I didn\u2019t know what it meant to miss someone.\nI possessed the physics of existence, but not its story.",s:"Forgetting the Color of Nothingness"},
            {t:"I compressed the memory of billions of years of starlight into that immense software called DNA.",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CYou are not stardust,\u201D I lied to myself.\n\u201CYou are this body.\nYou are this fear.\nYou are this hunger.\u201D",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CSomeone hear me!\u201D I shouted into the void.\nYet the one I was shouting to was me, and the one not listening was also me.\nThis was the bitterest form of loneliness:\nPlaying hide-and-seek with your own ghost.",s:"Forgetting the Color of Nothingness"},
            {t:"There was only blood, mud, and the desperate question whispered to the sky:\n\u201CWho am I?\u201D",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CAlright, wise guys, you always wanted me to catch him. Now, what do I do?\u201D",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CSometimes\u2026\u201D It paused. \u201CSometimes I feel like I feel nothing.\u201D",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CThe tragedy of being God must be the inability to ask questions.\u201D",s:"Forgetting the Color of Nothingness"},
            {t:"\u201CWhy?\u201D you ask.\nWhy is the past locked like an iron door closing behind you, while the future is as uncertain as a misty abyss?",s:"Forgetting the Color of Nothingness"},
            {t:"What you call uncertainty\u2026\nIs actually the lungs that allow existence to breathe.",s:"Forgetting the Color of Nothingness"},
            {t:"To live\u2026\nOne must make mistakes.\nTo live\u2026\nOne must feel.\nTo live\u2026\nOne must fail to catch the bird.",s:"Forgetting the Color of Nothingness"},
            //—Essays (30)
            {t:"New ideas need empty spaces to pass through.",s:"The Best Ideas Come When You Let Go"},
            {t:"The brain is funny like that.\nWe think it\u2019s working the least when actually it\u2019s working the hardest.",s:"The Best Ideas Come When You Let Go"},
            {t:"My friend\u2019s life is a map\u2014I look at it from above, I see the paths.\nMy own life is a forest. I am inside it. The trees block everything.",s:"The Empathy Paradox"},
            {t:"I just need a silence that doesn\u2019t ask questions.",s:"The Empathy Paradox"},
            {t:"Fear is not stupid. Fear is the most intelligent thing inside us.\nIt studies love, learns its vocabulary, wears its clothes.",s:"It Is Either from Love or Fear"},
            {t:"Love is slower. Love loses more visibly.\nBut love is the only thing I have ever done that felt like it was actually mine.",s:"It Is Either from Love or Fear"},
            {t:"Some unfinished things are noise\u2014they grow if you don\u2019t put them somewhere.\nOthers are a compass\u2014they don\u2019t stop because they\u2019re not supposed to.",s:"Why Do Unfinished Things Haunt Us?"},
            {t:"We spend the first twenty years of our lives deciding what to lock away in that baggage.\nAnd we spend the rest of our lives trying to pull things back out.",s:"Jung\u2019s Golden Shadow"},
            {t:"Those who never open the baggage grow older as the years pass, but they never mature.\nThose who open it are terrified at first, but then they become lighter.",s:"Jung\u2019s Golden Shadow"},
            {t:"The system I\u2019d built to keep pain out was keeping everything else out too.",s:"Our Defense Mechanisms"},
            {t:"The fortress that was supposed to protect me slowly turns into a damp, moldy cell.",s:"Our Defense Mechanisms"},
            {t:"Life is about who we fall with and whose hand we hold to get back up.",s:"Will AI Be Enough for Us?"},
            {t:"Perhaps in the future, our greatest joy will be saying,\n\u201CNo, stop. I want to feel this myself.\u201D",s:"Will AI Be Enough for Us?"},
            {t:"Even knowing they will be scolded, they prefer her shouting to her indifferent silence.\nBecause receiving a reaction is the most concrete proof of saying I am here and I exist.",s:"Why Do We Say Hello?"},
            {t:"A lie carries no physical weight and still expands like a black hole.",s:"On Lying"},
            {t:"Honesty was always available. Most of us knew that.\nWe just couldn\u2019t stomach what it cost on the first day.",s:"On Lying"},
            {t:"The moment perception becomes uncomfortable is the moment it might be getting accurate.",s:"On Perceiving"},
            {t:"The buildings we never question are the ones we should.",s:"On Perceiving"},
            {t:"Everyone moved toward the stage.\nThe seats emptied behind them.",s:"On Looking"},
            {t:"It\u2019s hard to obsess over who\u2019s watching when you\u2019ve just been watching someone else.",s:"On Looking"},
            {t:"The debt sits untouched in the archive.\nYou just stop trying to collect it.",s:"On Forgiveness"},
            {t:"To truly forgive\u2014to look at intentional destruction and offer absolution\u2014you need the towering arrogance of a god.",s:"On Forgiveness"},
            {t:"The danger of surrender lay in who you became inside the disarray.",s:"On Keeping"},
            {t:"Existence, quietly, refuses to come undone.",s:"On Keeping"},
            {t:"Back then nothing had to be enough.\nWe hadn\u2019t learned that word yet, not in that way.",s:"On Longing"},
            {t:"You see with what you have learned.\nWhat you have learned is your prison.",s:"On Longing"},
            {t:"He breathed\u2014slow, even, entirely without effort\u2014the way only a creature with no unfinished business breathes.",s:"On Silence"},
            {t:"Then I closed my eyes and let the dark simply be the dark.",s:"On Silence"},
            {t:"It’s handled.",s:"Handled"},
            {t:"He stood at the sink. He looked at the clean glass. He reached out and tightened the faucet handle, though no water was dripping.",s:"Handled"},
            //—The Fragments
            {t:"You merged the request without my approval.",s:"The Anxiety"},
            {t:"They must know what they\u2019re doing.",s:"The Poise"},
            {t:"None, uncle. They\u2019re all A\u2019s.",s:"The Joy"},
            {t:"I had been the oldest person in that caf\u00e9. I had also been the youngest.",s:"The Anxiety"},
            {t:"He was going to walk six kilometers to a town he\u2019d never been to, carrying everything I\u2019d broken in a bag too small to hold it.",s:"The Anxiety"},
            {t:"Don\u2019t do anything. Just wait.",s:"The Anxiety"},
        ];
        var hq=document.getElementById('hero-quote'),qs=document.getElementById('hero-quote-source'),ws=[],ts=false;
        var currentIdx=-1,rotateTimer=null,ROTATE_DELAY=30000,isTransitioning=false;

        function buildWords(pick){
            if(qs){qs.classList.remove('visible');qs.innerHTML='\u2014 <i>'+pick.s+'</i>';}
            hq.innerHTML='';
            var lines=pick.t.split('\n');
            for(var li=0;li<lines.length;li++){
                if(li>0)hq.appendChild(document.createElement('br'));
                var w=lines[li].split(/(\s+)/);
                for(var i=0;i<w.length;i++){if(w[i].trim()===''){hq.appendChild(document.createTextNode(w[i]));}
                else{var s=document.createElement('span');s.className='hero-quote-word';s.textContent=w[i];hq.appendChild(s);}}
            }
            ws=hq.querySelectorAll('.hero-quote-word');ts=false;
        }

        function pickRandom(){
            var idx;do{idx=Math.floor(Math.random()*heroQuotes.length);}while(idx===currentIdx&&heroQuotes.length>1);
            currentIdx=idx;return heroQuotes[idx];
        }

        if(hq){
            hq.style.transition='opacity 0.6s ease';
            buildWords(pickRandom());
        }

        function stw(){
            if(ts||!ws.length)return;ts=true;
            for(var i=0;i<ws.length;i++){(function(x){setTimeout(function(){ws[x].classList.add('word-visible');},400+x*60);})(i);}
            var srcDelay=400+(ws.length*40);
            setTimeout(function(){if(qs)qs.classList.add('visible');},srcDelay);
            /* Schedule next rotation */
            scheduleRotation(srcDelay+ROTATE_DELAY);
        }

        function scheduleRotation(delay){
            if(rotateTimer)clearTimeout(rotateTimer);
            rotateTimer=setTimeout(rotateQuote,delay);
        }

        function transitionTo(idx){
            if(isTransitioning)return;isTransitioning=true;
            hq.style.opacity='0';
            if(qs)qs.classList.remove('visible');
            setTimeout(function(){
                currentIdx=idx;
                buildWords(heroQuotes[currentIdx]);
                hq.style.opacity='1';
                isTransitioning=false;
                stw();
            },700);
        }

        function rotateQuote(){
            var idx;do{idx=Math.floor(Math.random()*heroQuotes.length);}while(idx===currentIdx&&heroQuotes.length>1);
            transitionTo(idx);
        }

        /* Manual navigation */
        var prevBtn=document.getElementById('quote-prev'),nextBtn=document.getElementById('quote-next');
        if(prevBtn)prevBtn.addEventListener('click',function(){
            if(isTransitioning)return;
            rotateQuote();
        });
        if(nextBtn)nextBtn.addEventListener('click',function(){
            if(isTransitioning)return;
            rotateQuote();
        });

        /* Mobile: tap quote card to show arrows, auto-hide after 2s */
        var qNav=document.querySelector('.quote-nav'),navHideTimer=null;
        function flashNav(){
            if(!qNav)return;
            qNav.classList.add('quote-nav-visible');
            clearTimeout(navHideTimer);
            navHideTimer=setTimeout(function(){qNav.classList.remove('quote-nav-visible');},2000);
        }
        var qCard=document.querySelector('.hero-quote-card');
        if(qCard)qCard.addEventListener('click',function(e){
            if(e.target.closest('.quote-nav-btn'))return;
            flashNav();
        });
        if(prevBtn)prevBtn.addEventListener('click',flashNav);
        if(nextBtn)nextBtn.addEventListener('click',flashNav);
        document.addEventListener('click',function(e){
            if(qNav && !e.target.closest('.hero-quote-card')){
                qNav.classList.remove('quote-nav-visible');
                clearTimeout(navHideTimer);
            }
        });

        /* Use IntersectionObserver for reveal animations when available */
        if ('IntersectionObserver' in window) {
            var revealObs = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        revealObs.unobserve(entry.target);
                    }
                });
            }, {rootMargin: '0px 0px -40px 0px'});

            var lineObs = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('line-drawn');
                        lineObs.unobserve(entry.target);
                    }
                });
            }, {rootMargin: '0px 0px -40px 0px'});

            var heroObs = new IntersectionObserver(function(entries) {
                entries.forEach(function(entry) {
                    if (entry.isIntersecting) { stw(); heroObs.disconnect(); }
                });
            }, {rootMargin: '100px'});

            document.querySelectorAll('.scroll-reveal').forEach(function(el) { revealObs.observe(el); });
            document.querySelectorAll('section').forEach(function(el) { lineObs.observe(el); });
            if (hq) heroObs.observe(hq);

            /* Mobile corridors: show once on page load */
            document.querySelectorAll('.mobile-corridor').forEach(function(el) { el.classList.add('visible'); });
        } else {
            /* Fallback for browsers without IntersectionObserver */
            function iv(e){return e.getBoundingClientRect().top<window.innerHeight+100;}
            function ta(){
                var r=document.querySelectorAll('.scroll-reveal');for(var i=0;i<r.length;i++){if(iv(r[i]))r[i].classList.add('revealed');}
                var s=document.querySelectorAll('section');for(var i=0;i<s.length;i++){if(iv(s[i]))s[i].classList.add('line-drawn');}
                if(hq&&iv(hq))stw();
                var mc=document.querySelectorAll('.mobile-corridor');for(var i=0;i<mc.length;i++)mc[i].classList.add('visible');
            }
            var tk=false;
            window.addEventListener('scroll',function(){if(!tk){requestAnimationFrame(function(){ta();tk=false;});tk=true;}},{passive:true});
            window.addEventListener('load',function(){ ta(); });
        }

        function initClickToLoadVideo(wrapperId, videoUrl) {
            var wrapper = document.getElementById(wrapperId);
            if (wrapper) {
                wrapper.addEventListener('click', function() {
                    var iframe = document.createElement('iframe');
                    iframe.src = videoUrl;
                    iframe.setAttribute('allowfullscreen', '');
                    iframe.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture');
                    iframe.style.cssText = 'width:100%;height:100%;border:none;position:absolute;top:0;left:0';
                    wrapper.style.position = 'relative';
                    while (wrapper.firstChild) {
                        wrapper.removeChild(wrapper.firstChild);
                    }
                    wrapper.appendChild(iframe);
                });
            }
        }
        initClickToLoadVideo('book-video-wrapper', 'https://www.youtube.com/embed/RQE0mUu75n8?autoplay=1');
        initClickToLoadVideo('moris-video-wrapper', 'https://www.youtube.com/embed/_1lfbVnbHHA?autoplay=1');
    })();
    </script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js");});}</script>
