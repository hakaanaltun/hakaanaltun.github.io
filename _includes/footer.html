<footer{% if page.series == "story" %} class="footer-quiet"{% endif %}>
  <div class="footer-inner">
    <div class="footer-bottom">
      {% unless page.series == "story" %}
      <div class="footer-utility">
        <nav class="footer-contact-links" aria-label="Find me">
          <a href="/feed.xml">RSS</a>
          <span class="footer-dot" aria-hidden="true">·</span>
          <a href="https://www.goodreads.com/author/show/69006405.Hakan_Altun"
             target="_blank"
             rel="noopener">Goodreads</a>
          <span class="footer-dot" aria-hidden="true">·</span>
          <a href="mailto:letters@hakanaltun.io">letters@hakanaltun.io</a>
        </nav>

        <span class="footer-utility-divider" aria-hidden="true"></span>

        <div class="footer-actions">
          <button
            class="footer-icon-btn footer-theme-toggle"
            id="theme-toggle"
            type="button"
            aria-label="Switch to dark theme"
            hidden
          >
            <svg
              class="theme-icon-moon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>

            <svg
              class="theme-icon-sun"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>

          <a href="/clock/" class="footer-icon-btn" aria-label="Clock">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
          </a>

          <button
            class="footer-icon-btn footer-share-btn"
            type="button"
            aria-label="Share this page"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="18" cy="5" r="3"/>
              <circle cx="6" cy="12" r="3"/>
              <circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
          </button>
        </div>
      </div>
      {% endunless %}

      <a href="#" class="footer-home-link" aria-label="Back to top">
        <span class="footer-brand">On Life &amp; Everything</span>
        <span class="footer-tagline">
          Essays, short fiction, and other writing.
        </span>
      </a>

      <p class="footer-credit">
        Hakan Altun · İstanbul, 2026 · &copy; All rights reserved.
      </p>
    </div>
  </div>
</footer>
