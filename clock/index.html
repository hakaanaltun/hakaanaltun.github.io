<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fullscreen Clock, Countdown &amp; Stopwatch &middot; On Life &amp; Everything</title>
<meta name="description" content="A clean, ad-free fullscreen clock with a countdown and stopwatch. Large tabular numerals, an analog view, and a distraction-free display — made for classrooms and exams.">
<link rel="canonical" href="https://hakanaltun.io/clock/">
<meta property="og:type" content="website">
<meta property="og:title" content="Fullscreen Clock, Countdown &amp; Stopwatch">
<meta property="og:description" content="A clean, ad-free fullscreen clock with a countdown and stopwatch — distraction-free, made for classrooms and exams.">
<meta property="og:url" content="https://hakanaltun.io/clock/">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=EB+Garamond:ital@0;1&display=swap">

<style>
  :root{
    --bg:     #1E4F4C;
    --fg:     #EDE4CF;
    --muted:  #A8B8B3;
    --accent: #EDE4CF;
    --alert:  #E6A15C;
    --line:   rgba(237,228,207,0.30);

    --display: 'Cormorant Garamond', Georgia, serif;
    --body:    'EB Garamond', Georgia, serif;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }

  body{
    background:var(--bg); color:var(--fg); font-family:var(--body);
    height:100vh; height:100dvh; overflow:hidden; display:flex; flex-direction:column;
    -webkit-font-smoothing:antialiased;
  }

  .chrome{
    position:relative;
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 26px; border-bottom:1px solid var(--line);
    gap:12px; transition:border-color .4s ease;
  }
  .chrome .tabs, .chrome .settings{ transition:opacity .4s ease; }
  .tabs{ display:flex; gap:4px; }
  .tab{
    background:none; border:1px solid transparent; color:var(--muted);
    font-family:var(--body); font-size:16px; letter-spacing:.02em;
    padding:8px 18px; border-radius:999px; cursor:pointer;
    transition:color .2s, background .2s;
  }
  .tab:hover{ color:var(--fg); }
  .tab[aria-selected="true"]{ color:var(--bg); background:var(--accent); }
  .tab:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .settings{ display:flex; align-items:center; gap:18px; }
  .toggle{
    display:flex; align-items:center; gap:8px; color:var(--muted);
    font-size:14px; letter-spacing:.02em; cursor:pointer; user-select:none;
  }
  .toggle input{ accent-color:var(--accent); width:16px; height:16px; cursor:pointer; }
  .icon-btn{
    background:none; border:1px solid var(--line); color:var(--muted);
    width:40px; height:40px; border-radius:8px; cursor:pointer; font-size:17px;
    display:grid; place-items:center; transition:color .2s, border-color .2s;
  }
  .icon-btn:hover{ color:var(--fg); border-color:var(--muted); }
  .icon-btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .stage{ flex:1; display:grid; place-items:center; position:relative; text-align:center; padding:24px; }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .display{
    font-family:var(--display); font-weight:400;
    font-variant-numeric:lining-nums tabular-nums;
    font-feature-settings:"tnum" 1, "lnum" 1;
    line-height:.95; white-space:nowrap; cursor:pointer;
    font-size:clamp(4rem, 20vw, 22rem); letter-spacing:.01em;
  }
  .display .sec{ color:var(--muted); }
  .display .cs{ color:var(--muted); font-size:0.4em; letter-spacing:0; }
  .display .unit{ color:var(--muted); font-size:0.32em; font-style:italic; letter-spacing:0.02em; margin-left:0.18em; }

  .subline{
    margin-top:.5em; font-family:var(--body); font-style:italic;
    color:var(--muted); font-size:clamp(1.1rem, 3.5vw, 2.1rem); letter-spacing:.02em;
  }

  /* analog */
  .face-slot{ display:none; }
  .analog-face{ width:clamp(220px, 56vmin, 540px); height:auto; display:block; margin:0 auto; cursor:pointer; }
  body.immersive .analog-face{ width:clamp(280px, 62vmin, 640px); }
  .analog-face .tick{ stroke:var(--muted); stroke-width:2; }
  .analog-face .tick.major{ stroke:var(--fg); stroke-width:3; }
  .analog-face .ring-fg{ fill:none; stroke:var(--alert); stroke-width:4; stroke-linecap:round; transform:rotate(-90deg); transform-origin:100px 100px; display:none; }
  .analog-face .hand{ stroke-linecap:round; }
  .analog-face .hand-h{ stroke:var(--fg); stroke-width:5; }
  .analog-face .hand-m{ stroke:var(--fg); stroke-width:4; }
  .analog-face .hand-s{ stroke:var(--alert); stroke-width:2; }
  .analog-face .cap{ fill:var(--fg); }
  body.alarm .analog-face .hand{ stroke:var(--alert); }

  .controls{ margin-top:2.4rem; display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap; }
  .btn{
    font-family:var(--display); font-style:italic; font-size:1.25rem;
    padding:9px 28px; border-radius:0; cursor:pointer;
    border:1px solid var(--line); background:none; color:var(--fg);
    transition:background .2s, color .2s, border-color .2s;
  }
  .btn:hover{ border-color:var(--fg); }
  .btn.primary{ background:var(--accent); color:var(--bg); border-color:var(--accent); }
  .btn.primary:hover{ filter:brightness(1.06); }
  .btn:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  .mode-row{ display:flex; gap:10px; justify-content:center; align-items:center; margin-bottom:1.8rem; flex-wrap:wrap; }
  .seg{ display:flex; border:1px solid var(--line); border-radius:999px; overflow:hidden; }
  .seg button{
    background:none; border:none; color:var(--muted); font-family:var(--body);
    font-size:14px; padding:8px 18px; cursor:pointer; letter-spacing:.02em;
  }
  .seg button[aria-pressed="true"]{ background:var(--accent); color:var(--bg); }

  .time-input{
    background:transparent; border:1px solid var(--line); color:var(--fg);
    font-family:var(--display); font-size:1.7rem; padding:5px 12px; border-radius:8px;
    text-align:center; letter-spacing:.04em;
  }
  .time-input:focus{ outline:2px solid var(--accent); outline-offset:2px; }
  .dur-input{ width:4.5ch; }
  .field-label{ color:var(--muted); font-size:14px; font-style:italic; margin:0 4px; }

  body.alarm .display{ color:var(--alert); }
  body.alarm{ animation:flash 1s steps(1) infinite; }
  @keyframes flash{ 50%{ filter:brightness(1.28); } }
  .overtime{ color:var(--alert); font-family:var(--body); font-style:italic; font-size:clamp(1rem,2.5vw,1.5rem); margin-top:.45em; letter-spacing:.04em; }

  /* logo — centered at top, like the site header */
  .masthead{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    text-decoration:none; display:flex; flex-direction:column; align-items:center;
    gap:1px; text-align:center; opacity:.85; transition:opacity .2s;
  }
  .masthead:hover{ opacity:1; }
  .home-brand{ font-family:var(--display); font-style:italic; font-weight:400; font-size:1.1rem; line-height:1.05; color:var(--fg); }
  .home-tagline{ font-family:var(--body); font-style:italic; font-weight:400; font-size:0.8rem; line-height:1.2; color:var(--muted); }

  /* seconds toggle — bottom-left */
  .seconds-corner{ position:absolute; left:26px; bottom:20px; transition:opacity .4s ease; }
  .theme-corner{ position:absolute; right:26px; bottom:20px; display:flex; gap:9px; align-items:center; transition:opacity .4s ease; }
  .swatch{ width:20px; height:20px; border-radius:999px; border:1px solid rgba(237,228,207,0.35); padding:0; cursor:pointer; transition:transform .15s ease; }
  .swatch:hover{ transform:scale(1.12); }
  .swatch[aria-pressed="true"]{ box-shadow:0 0 0 2px var(--fg); }
  .swatch:focus-visible{ outline:2px solid var(--fg); outline-offset:2px; }

  body.immersive .chrome{ border-color:transparent; }
  body.immersive .tabs, body.immersive .settings, body.immersive .masthead,
  body.immersive .seconds-corner, body.immersive .theme-corner, body.immersive .controls, body.immersive .mode-row{
    opacity:0; pointer-events:none; transition:opacity .4s;
  }
  body.immersive.show-chrome .tabs, body.immersive.show-chrome .settings, body.immersive.show-chrome .masthead,
  body.immersive.show-chrome .seconds-corner, body.immersive.show-chrome .theme-corner, body.immersive.show-chrome .controls, body.immersive.show-chrome .mode-row{
    opacity:1; pointer-events:auto;
  }
  body.immersive .display{ font-size:clamp(5rem, 23vw, 25rem); }

  /* mobile: logo top-center, fullscreen top-right, tabs full-width below */
  @media (max-width:600px){
    .chrome{
      display:grid; grid-template-columns:40px 1fr 40px;
      grid-template-areas:". logo fs" "tabs tabs tabs";
      align-items:center; row-gap:12px; padding:12px 14px;
    }
    .masthead{ position:static; transform:none; grid-area:logo; }
    .settings{ grid-area:fs; justify-self:end; }
    .tabs{ grid-area:tabs; justify-content:center; flex-wrap:wrap; gap:6px; }
    .tab{ padding:7px 14px; font-size:15px; }
    .home-brand{ font-size:1rem; }
    .home-tagline{ font-size:0.74rem; }
    .seconds-corner{ left:16px; bottom:16px; }
    .theme-corner{ right:16px; bottom:16px; gap:7px; }
  }

  /* landscape phones: drop the logo (short, wide viewport crowds it) */
  @media (orientation:landscape) and (max-height:500px){
    .masthead{ display:none; }
    .chrome{ padding:8px 14px; }
    .stage{ padding:8px; }
    .display{ font-size:clamp(2.4rem, 15vh, 6rem); }
    .subline{ font-size:clamp(0.85rem, 4.5vh, 1.3rem); margin-top:.35em; }
    .controls{ margin-top:1.1rem; }
    .mode-row{ margin-bottom:0.9rem; }
    .analog-face{ width:clamp(150px, 40vh, 280px); }
  }

  @media (prefers-reduced-motion:reduce){
    body.alarm{ animation:none; }
    *{ transition:none !important; }
  }
</style>
</head>
<body>

  <div class="chrome" id="chrome">
    <div class="tabs" role="tablist" aria-label="View">
      <button class="tab" role="tab" data-panel="clock"     aria-selected="true">Clock</button>
      <button class="tab" role="tab" data-panel="countdown" aria-selected="false">Countdown</button>
      <button class="tab" role="tab" data-panel="stopwatch" aria-selected="false">Stopwatch</button>
    </div>
    <a class="masthead" href="/" aria-label="On Life &amp; Everything — home">
      <span class="home-brand">On Life &amp; Everything</span>
      <span class="home-tagline">Essays, short fiction, and other writing.</span>
    </a>
    <div class="settings">
      <button class="icon-btn" id="fsBtn" title="Fullscreen" aria-label="Fullscreen">&#10530;</button>
    </div>
  </div>

  <div class="stage">

    <section class="panel active" id="clock">
      <div class="display" id="clockDisplay">00:00</div>
      <div class="face-slot"></div>
      <div class="subline" id="dateLine"></div>
    </section>

    <section class="panel" id="countdown">
      <div class="mode-row">
        <div class="seg" role="group" aria-label="Countdown mode">
          <button id="modeTarget" aria-pressed="true">End time</button>
          <button id="modeDur" aria-pressed="false">Duration</button>
        </div>
        <span id="targetWrap"><input type="time" id="targetTime" class="time-input" step="60"></span>
        <span id="durWrap" style="display:none">
          <input type="number" id="durH" class="time-input dur-input" min="0" max="23" value="1" inputmode="numeric">
          <span class="field-label">hr</span>
          <input type="number" id="durM" class="time-input dur-input" min="0" max="59" value="30" inputmode="numeric">
          <span class="field-label">min</span>
        </span>
      </div>
      <div class="display" id="cdDisplay"><span id="cdMain">00:00</span><span class="unit" id="cdUnit"></span></div>
      <div class="face-slot"></div>
      <div class="overtime" id="overtime"></div>
      <div class="controls">
        <button class="btn primary" id="cdStart">Start</button>
        <button class="btn" id="cdReset">Reset</button>
      </div>
    </section>

    <section class="panel" id="stopwatch">
      <div class="display" id="swDisplay"><span id="swMain">00:00</span><span class="cs" id="swCs">.00</span></div>
      <div class="face-slot"></div>
      <div class="controls">
        <button class="btn primary" id="swStart">Start</button>
        <button class="btn" id="swReset">Reset</button>
      </div>
    </section>

    <div class="seconds-corner">
      <label class="toggle"><input type="checkbox" id="secToggle" checked> Seconds</label>
    </div>

    <div class="theme-corner" role="group" aria-label="Theme">
      <button class="swatch" data-bg="#1E4F4C" style="background:#1E4F4C" title="Petrol" aria-label="Petrol"></button>
      <button class="swatch" data-bg="#17333D" style="background:#17333D" title="Prussian blue" aria-label="Prussian blue"></button>
      <button class="swatch" data-bg="#342A3E" style="background:#342A3E" title="Aubergine" aria-label="Aubergine"></button>
      <button class="swatch" data-bg="#4C2A2F" style="background:#4C2A2F" title="Oxblood" aria-label="Oxblood"></button>
      <button class="swatch" data-bg="#1E1B1A" style="background:#1E1B1A" title="Ink" aria-label="Ink"></button>
    </div>
  </div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const pad = n => String(n).padStart(2,"0");
  const LS = "olae-clock-v1";
  const RING_C = 2*Math.PI*92;

  const state = Object.assign({
    panel:"clock", seconds:true, analog:false, bg:null, cdMode:"target",
    cdTargetEpoch:null, cdTotalMs:null, cdRunning:false, cdRemainingPaused:null,
    swStartEpoch:null, swAccumMs:0, swRunning:false
  }, load());

  function load(){ try{ return JSON.parse(localStorage.getItem(LS)) || {}; }catch(e){ return {}; } }
  function save(){ try{ localStorage.setItem(LS, JSON.stringify(state)); }catch(e){} }

  /* ---- analog face (built once, moved into the active panel) ---- */
  function buildFace(){
    const NS="http://www.w3.org/2000/svg";
    const svg=document.createElementNS(NS,"svg");
    svg.setAttribute("viewBox","0 0 200 200");
    svg.setAttribute("class","analog-face");
    let html="";
    for(let i=0;i<12;i++){
      const a=i*30*Math.PI/180, outer=94, inner=(i%3===0)?80:86;
      const x1=(100+outer*Math.sin(a)).toFixed(1), y1=(100-outer*Math.cos(a)).toFixed(1);
      const x2=(100+inner*Math.sin(a)).toFixed(1), y2=(100-inner*Math.cos(a)).toFixed(1);
      html+='<line class="tick '+(i%3===0?'major':'')+'" x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'"/>';
    }
    html+='<circle class="ring-fg" cx="100" cy="100" r="92"/>';
    html+='<line class="hand hand-h" x1="100" y1="100" x2="100" y2="56"/>';
    html+='<line class="hand hand-m" x1="100" y1="100" x2="100" y2="38"/>';
    html+='<line class="hand hand-s" x1="100" y1="110" x2="100" y2="30"/>';
    html+='<circle class="cap" cx="100" cy="100" r="3.5"/>';
    svg.innerHTML=html;
    return svg;
  }
  const face=buildFace();
  const handH=face.querySelector(".hand-h"), handM=face.querySelector(".hand-m"),
        handS=face.querySelector(".hand-s"), ring=face.querySelector(".ring-fg");
  face.addEventListener("click", toggleAnalog);
  function rot(el,deg){ el.setAttribute("transform","rotate("+deg.toFixed(2)+" 100 100)"); }

  /* ---- tabs ---- */
  const tabs=[...document.querySelectorAll(".tab")];
  const panels={ clock:$("#clock"), countdown:$("#countdown"), stopwatch:$("#stopwatch") };
  function selectPanel(name){
    state.panel=name;
    tabs.forEach(t=>t.setAttribute("aria-selected", t.dataset.panel===name));
    Object.entries(panels).forEach(([k,el])=>el.classList.toggle("active", k===name));
    applyAnalog(); save();
  }
  tabs.forEach(t=>t.addEventListener("click", ()=>selectPanel(t.dataset.panel)));

  /* ---- analog visibility ---- */
  function applyAnalog(){
    document.querySelectorAll(".panel").forEach(p=>{
      const disp=p.querySelector(".display"), slot=p.querySelector(".face-slot");
      disp.style.display = state.analog ? "none" : "";
      slot.style.display = state.analog ? "block" : "none";
    });
    if(state.analog){ panels[state.panel].querySelector(".face-slot").appendChild(face); }
  }
  function toggleAnalog(){ state.analog=!state.analog; applyAnalog(); save(); }
  document.querySelectorAll(".display").forEach(d=>d.addEventListener("click", toggleAnalog));

  /* ---- seconds toggle ---- */
  const secToggle=$("#secToggle");
  secToggle.checked=state.seconds;
  secToggle.addEventListener("change", ()=>{ state.seconds=secToggle.checked; save(); });

  /* ---- themes ---- */
  const swatches=[...document.querySelectorAll(".swatch")];
  function applyTheme(){
    if(state.bg) document.documentElement.style.setProperty("--bg", state.bg);
    else document.documentElement.style.removeProperty("--bg");
    const cur=(state.bg||"#1E4F4C").toLowerCase();
    swatches.forEach(sw=>sw.setAttribute("aria-pressed", sw.dataset.bg.toLowerCase()===cur));
  }
  swatches.forEach(sw=>sw.addEventListener("click", ()=>{ state.bg=sw.dataset.bg; applyTheme(); save(); }));

  /* ---- fullscreen (webkit-prefixed + CSS fallback for iOS Safari) ---- */
  const fsBtn=$("#fsBtn");
  const docEl=document.documentElement;
  let fakeFs=false;
  function nativeFsElement(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
  function requestFs(){
    const fn = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
    if(fn){ try{ fn.call(docEl); return true; }catch(e){} }
    return false;
  }
  function exitFs(){
    const fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(fn){ try{ fn.call(document); }catch(e){} }
  }
  function syncImmersive(){
    const on = !!nativeFsElement() || fakeFs;
    document.body.classList.toggle("immersive", on);
    if(on) pokeChrome();
  }
  fsBtn.addEventListener("click", ()=>{
    if(nativeFsElement()){ exitFs(); return; }
    if(fakeFs){ fakeFs=false; syncImmersive(); return; }
    if(!requestFs()){ fakeFs=true; syncImmersive(); }   // API yoksa (ör. iOS Safari) CSS odak modu
  });
  document.addEventListener("fullscreenchange", syncImmersive);
  document.addEventListener("webkitfullscreenchange", syncImmersive);
  document.addEventListener("keydown", (e)=>{ if(e.key==="Escape" && fakeFs){ fakeFs=false; syncImmersive(); } });
  let chromeTimer;
  function pokeChrome(){
    document.body.classList.add("show-chrome");
    clearTimeout(chromeTimer);
    chromeTimer=setTimeout(()=>document.body.classList.remove("show-chrome"), 2800);
  }
  ["mousemove","touchstart","keydown"].forEach(ev=>
    document.addEventListener(ev, ()=>{ if(document.body.classList.contains("immersive")) pokeChrome(); }));

  /* ---- countdown mode ---- */
  const modeTarget=$("#modeTarget"), modeDur=$("#modeDur");
  const targetWrap=$("#targetWrap"), durWrap=$("#durWrap");
  function setCdMode(m){
    state.cdMode=m; save();
    const t=m==="target";
    modeTarget.setAttribute("aria-pressed", t);
    modeDur.setAttribute("aria-pressed", !t);
    targetWrap.style.display=t?"":"none";
    durWrap.style.display=t?"none":"";
  }
  modeTarget.addEventListener("click", ()=>setCdMode("target"));
  modeDur.addEventListener("click", ()=>setCdMode("dur"));

  (function initTargetField(){
    const d=new Date(Date.now()+60*60*1000);
    $("#targetTime").value=pad(d.getHours())+":"+pad(d.getMinutes());
  })();

  function cdStart(){
    let target;
    if(state.cdMode==="target"){
      const v=$("#targetTime").value; if(!v) return;
      const [h,m]=v.split(":").map(Number);
      const d=new Date(); d.setHours(h,m,0,0);
      if(d.getTime()<=Date.now()) d.setDate(d.getDate()+1);
      target=d.getTime();
    } else {
      const ms=((+$("#durH").value||0)*3600+(+$("#durM").value||0)*60)*1000;
      if(ms<=0) return;
      target=Date.now()+ms;
    }
    state.cdTotalMs=target-Date.now();
    state.cdTargetEpoch=target; state.cdRunning=true; state.cdRemainingPaused=null; save();
  }
  function cdPause(){ state.cdRemainingPaused=Math.max(0,state.cdTargetEpoch-Date.now()); state.cdRunning=false; save(); }
  function cdResume(){
    if(state.cdRemainingPaused==null) return;
    state.cdTargetEpoch=Date.now()+state.cdRemainingPaused; state.cdRunning=true; state.cdRemainingPaused=null; save();
  }
  function cdReset(){ state.cdRunning=false; state.cdTargetEpoch=null; state.cdRemainingPaused=null; state.cdTotalMs=null; document.body.classList.remove("alarm"); save(); }
  const cdStartBtn=$("#cdStart");
  cdStartBtn.addEventListener("click", ()=>{
    if(state.cdRunning) cdPause();
    else if(state.cdRemainingPaused!=null) cdResume();
    else cdStart();
  });
  $("#cdReset").addEventListener("click", cdReset);

  /* ---- stopwatch ---- */
  const swStartBtn=$("#swStart");
  function swElapsed(){ return state.swAccumMs+(state.swRunning?Date.now()-state.swStartEpoch:0); }
  swStartBtn.addEventListener("click", ()=>{
    if(state.swRunning){ state.swAccumMs=swElapsed(); state.swRunning=false; }
    else{ state.swStartEpoch=Date.now(); state.swRunning=true; }
    save();
  });
  $("#swReset").addEventListener("click", ()=>{ state.swRunning=false; state.swAccumMs=0; state.swStartEpoch=null; save(); });

  /* ---- formatting ---- */
  function fmt(ms){
    const total=Math.floor(ms/1000);
    const h=Math.floor(total/3600), m=Math.floor(total%3600/60), s=total%60;
    return h>0 ? pad(h)+":"+pad(m)+":"+pad(s) : pad(m)+":"+pad(s);
  }

  function fmtCd(ms){
    const total=Math.floor(ms/1000);
    const h=Math.floor(total/3600), m=Math.floor(total%3600/60), s=total%60;
    if(state.seconds){
      return { main: h>0 ? pad(h)+":"+pad(m)+":"+pad(s) : pad(m)+":"+pad(s), unit:"" };
    }
    let tm=Math.ceil(ms/60000); if(tm<0) tm=0;           // saniye kapalı: kalan dakika (yukarı yuvarla)
    const hh=Math.floor(tm/60), mm=tm%60;
    return hh>0 ? { main: hh+":"+pad(mm), unit:"" } : { main: String(mm), unit:"min" };
  }
  function swParts(ms){
    const total=Math.floor(ms/1000);
    const h=Math.floor(total/3600), m=Math.floor(total%3600/60), s=total%60;
    if(h>0) return { main: pad(h)+":"+pad(m)+":"+pad(s), cs: "" };
    const cs=Math.floor(ms/10)%100;
    return { main: pad(m)+":"+pad(s), cs: "."+pad(cs) };
  }
  function handsFromMs(ms){
    const s=ms/1000;
    return { s:(s%60)*6, m:((ms/60000)%60)*6, h:((ms/3600000)%12)*30 };
  }

  /* ---- render loop ---- */
  const clockDisplay=$("#clockDisplay"), dateLine=$("#dateLine");
  const overtime=$("#overtime");
  const cdMain=$("#cdMain"), cdUnit=$("#cdUnit");
  function showCd(ms){ const p=fmtCd(ms); setText(cdMain,"cdm",p.main); setText(cdUnit,"cdu",p.unit); }
  const swMain=$("#swMain"), swCs=$("#swCs");
  const dateFmt=new Intl.DateTimeFormat("en-US",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  const last={};
  function setText(el,key,val){ if(last[key]!==val){ last[key]=val; el.textContent=val; } }
  function setHTML(el,key,val){ if(last[key]!==val){ last[key]=val; el.innerHTML=val; } }

  function tick(){
    const now=new Date();

    /* clock digital */
    const t=pad(now.getHours())+":"+pad(now.getMinutes());
    setHTML(clockDisplay,"clk", state.seconds ? t+'<span class="sec">:'+pad(now.getSeconds())+'</span>' : t);
    setText(dateLine,"date", dateFmt.format(now));

    /* countdown digital + state */
    let alarm=false, cdRemaining=0, cdFrac=null;
    if(state.cdRunning){
      const rem=state.cdTargetEpoch-Date.now();
      if(rem>0){ cdRemaining=rem; showCd(rem); setText(overtime,"ot",""); cdStartBtn.textContent="Pause"; }
      else{ cdRemaining=0; showCd(0); setText(overtime,"ot","Time\u2019s up  \u00B7  +"+fmt(-rem)); cdStartBtn.textContent="Start"; alarm=true; }
    } else if(state.cdRemainingPaused!=null){
      cdRemaining=state.cdRemainingPaused; showCd(cdRemaining); setText(overtime,"ot",""); cdStartBtn.textContent="Resume";
    } else {
      showCd(0); setText(overtime,"ot",""); cdStartBtn.textContent="Start";
    }
    if(state.cdTotalMs) cdFrac=Math.max(0,Math.min(1,cdRemaining/state.cdTotalMs));
    document.body.classList.toggle("alarm", alarm && state.panel==="countdown");

    /* stopwatch digital */
    const sw=swElapsed();
    const swp=swParts(sw);
    setText(swMain,"swm", swp.main);
    setText(swCs,"swc", swp.cs);
    swStartBtn.textContent = state.swRunning ? "Pause" : (sw>0 ? "Resume" : "Start");

    /* analog */
    if(state.analog){
      let ang;
      if(state.panel==="clock"){
        const ms=now.getHours()*3600000+now.getMinutes()*60000+now.getSeconds()*1000+now.getMilliseconds();
        ang=handsFromMs(ms);
        ring.style.display="none";
      } else if(state.panel==="stopwatch"){
        ang=handsFromMs(sw);
        ring.style.display="none";
      } else {
        ang=handsFromMs(cdRemaining);
        if(cdFrac!=null){
          ring.style.display="block";
          ring.setAttribute("stroke-dasharray", RING_C.toFixed(1));
          ring.setAttribute("stroke-dashoffset", (RING_C*(1-cdFrac)).toFixed(1));
        } else { ring.style.display="none"; }
      }
      rot(handH,ang.h); rot(handM,ang.m); rot(handS,ang.s);
    }

    requestAnimationFrame(tick);
  }

  setCdMode(state.cdMode);
  applyTheme();
  applyAnalog();
  selectPanel(state.panel);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
