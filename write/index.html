<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Blank Page &mdash; Distraction-Free Writing &middot; On Life &amp; Everything</title>

<meta property="og:title" content="A Blank Page — Distraction-Free Writing">
<meta property="og:description" content="A quiet, ad-free page to write on. What you write stays in your browser; nothing is sent anywhere.">
<meta property="og:url" content="https://hakanaltun.io/write/">

<link rel="stylesheet" href="/css/fonts.css?v=20260710-1">

<style>
  :root{
    --paper: #FFFFFF;
    --ink:   #2F2B27;
    --muted: #746F69;
    --line:  #EEEAE4;

    --display: 'Cormorant Garamond', Georgia, serif;
    --body:    'EB Garamond', Georgia, serif;

    color-scheme: light;
  }
  @media (prefers-color-scheme: dark){
    html:not([data-theme="light"]){
      --paper:#191712; --ink:#E7E1D6; --muted:#9C948A; --line:#2B2721;
      color-scheme: dark;
    }
  }
  html[data-theme="dark"]{
    --paper:#191712; --ink:#E7E1D6; --muted:#9C948A; --line:#2B2721;
    color-scheme: dark;
  }
  /* theme toggle icons: moon in light, sun in dark */
  :root{ --icon-sun:none; --icon-moon:block; }
  @media (prefers-color-scheme: dark){
    html:not([data-theme="light"]){ --icon-sun:block; --icon-moon:none; }
  }
  html[data-theme="dark"]{ --icon-sun:block; --icon-moon:none; }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    background:var(--paper); color:var(--ink); font-family:var(--body);
    min-height:100vh; min-height:100dvh;
    -webkit-font-smoothing:antialiased;
    transition:background .4s ease, color .4s ease;
  }

  .chrome{
    position:sticky; top:0; z-index:2; background:var(--paper);
    display:grid; grid-template-columns:1fr auto 1fr; align-items:center;
    padding:14px 22px; border-bottom:1px solid var(--line);
    transition:opacity .4s ease, border-color .4s ease, background .4s ease;
  }
  .masthead{
    grid-column:2; text-decoration:none; display:flex; flex-direction:column;
    align-items:center; gap:1px; text-align:center; opacity:.85; transition:opacity .2s;
  }
  .masthead:hover{ opacity:1; }
  .home-brand{ font-family:var(--display); font-style:italic; font-weight:400; font-size:1.1rem; line-height:1.05; color:var(--ink); }
  .home-tagline{ font-family:var(--body); font-style:italic; font-weight:400; font-size:0.8rem; line-height:1.2; color:var(--muted); }

  .actions{ grid-column:3; justify-self:end; display:flex; gap:8px; }
  .icon-btn{
    background:none; border:1px solid var(--line); color:var(--muted);
    width:38px; height:38px; border-radius:8px; cursor:pointer; font-size:16px;
    display:grid; place-items:center; transition:color .2s, border-color .2s;
  }
  .icon-btn:hover{ color:var(--ink); border-color:var(--muted); }
  .icon-btn:focus-visible{ outline:2px solid var(--ink); outline-offset:2px; }
  .icon-btn svg{ width:16px; height:16px; }
  .theme-btn .icon-sun{ display:var(--icon-sun); }
  .theme-btn .icon-moon{ display:var(--icon-moon); }

  .sheet{ max-width:680px; margin:0 auto; padding:8vh 26px 32vh; }
  textarea{
    display:block; width:100%; min-height:52vh;
    border:0; background:transparent; color:var(--ink);
    font-family:var(--body); font-size:1.35rem; line-height:1.66;
    resize:none; outline:none; overflow:hidden;
    caret-color:var(--ink);
  }
  textarea::placeholder{ color:var(--muted); font-style:italic; opacity:.65; }

  .corner{
    position:fixed; bottom:16px; font-family:var(--body); font-style:italic;
    font-size:0.85rem; color:var(--muted); letter-spacing:.02em;
    pointer-events:none; user-select:none;
  }
  .corner.words{ left:20px; }
  .corner.saved{ right:20px; opacity:0; transition:opacity .6s ease; }
  .corner.saved.on{ opacity:1; }

  /* fullscreen focus: only the chrome retires; the page and its count remain */
  body.immersive .chrome{ opacity:0; pointer-events:none; }
  body.immersive.show-chrome .chrome{ opacity:1; pointer-events:auto; }

  @media (max-width:600px){
    .chrome{ padding:12px 14px; }
    .home-brand{ font-size:1rem; }
    .home-tagline{ font-size:0.74rem; }
    .sheet{ padding:5vh 20px 30vh; }
    textarea{ font-size:1.22rem; }
    .corner.words{ left:16px; }
    .corner.saved{ right:16px; }
  }

  @media (prefers-reduced-motion:reduce){
    *{ transition:none !important; }
  }
</style>
<script>(function(){try{var t=localStorage.getItem('olae-page-theme');if(t==='dark'||t==='light'){document.documentElement.setAttribute('data-theme',t);}}catch(e){}})();</script>
</head>
<body>

  <div class="chrome" id="chrome">
    <span aria-hidden="true"></span>
    <a class="masthead" href="/" aria-label="On Life &amp; Everything — home">
      <span class="home-brand">On Life &amp; Everything</span>
      <span class="home-tagline">Essays, short fiction, and other writing.</span>
    </a>
    <div class="actions">
      <button class="icon-btn theme-btn" id="themeBtn" type="button" title="Light / dark" aria-label="Switch theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
      <button class="icon-btn" id="dlBtn" type="button" title="Download as .txt" aria-label="Download as text file">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      </button>
      <button class="icon-btn" id="fsBtn" type="button" title="Fullscreen" aria-label="Fullscreen">&#10530;</button>
    </div>
  </div>

  <div class="sheet">
    <label for="page" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);">Write here</label>
    <textarea id="page" placeholder="Start anywhere." autocomplete="off" spellcheck="true"></textarea>
  </div>

  <div class="corner words" id="wordCount" aria-live="polite">0 words</div>
  <div class="corner saved" id="savedNote">Saved &mdash; stays in this browser</div>

<script>
(function(){
  "use strict";
  var $ = function(s){ return document.querySelector(s); };
  var LS = "olae-page-v1";
  var ta = $("#page"), wordEl = $("#wordCount"), savedEl = $("#savedNote");

  /* ---- restore ---- */
  try{
    var saved = JSON.parse(localStorage.getItem(LS));
    if(saved && typeof saved.text === "string") ta.value = saved.text;
  }catch(e){}

  /* ---- grow + count ---- */
  function grow(){ ta.style.height = "auto"; ta.style.height = ta.scrollHeight + "px"; }
  function count(){
    var m = ta.value.match(/\S+/g);
    var n = m ? m.length : 0;
    wordEl.textContent = n === 1 ? "1 word" : n + " words";
  }

  /* ---- autosave (local only — nothing leaves the page) ---- */
  var saveT, noteT;
  function saveNow(){
    try{
      localStorage.setItem(LS, JSON.stringify({ text: ta.value, at: Date.now() }));
      savedEl.classList.add("on");
      clearTimeout(noteT);
      noteT = setTimeout(function(){ savedEl.classList.remove("on"); }, 2200);
    }catch(e){}
  }
  ta.addEventListener("input", function(){
    grow(); count();
    clearTimeout(saveT);
    saveT = setTimeout(saveNow, 500);
  });
  document.addEventListener("keydown", function(e){
    if((e.metaKey || e.ctrlKey) && (e.key === "s" || e.key === "S")){ e.preventDefault(); saveNow(); }
  });
  window.addEventListener("beforeunload", function(){
    try{ localStorage.setItem(LS, JSON.stringify({ text: ta.value, at: Date.now() })); }catch(e){}
  });

  /* ---- download ---- */
  $("#dlBtn").addEventListener("click", function(){
    var text = ta.value;
    if(!text.replace(/\s/g,"").length) return;
    var name = "page-" + new Date().toISOString().slice(0,10) + ".txt";
    var a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([text], { type: "text/plain;charset=utf-8" }));
    a.download = name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
  });

  /* ---- theme ---- */
  $("#themeBtn").addEventListener("click", function(){
    var root = document.documentElement;
    var current = root.getAttribute("data-theme");
    var next;
    if(current === "dark") next = "light";
    else if(current === "light") next = "dark";
    else next = window.matchMedia("(prefers-color-scheme: dark)").matches ? "light" : "dark";
    root.setAttribute("data-theme", next);
    try{ localStorage.setItem("olae-page-theme", next); }catch(e){}
  });

  /* ---- fullscreen (webkit-prefixed + CSS fallback, as on /clock/) ---- */
  var docEl = document.documentElement, fakeFs = false;
  function nativeFsElement(){ return document.fullscreenElement || document.webkitFullscreenElement || null; }
  function requestFs(){
    var fn = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.mozRequestFullScreen || docEl.msRequestFullscreen;
    if(fn){ try{ fn.call(docEl); return true; }catch(e){} }
    return false;
  }
  function exitFs(){
    var fn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
    if(fn){ try{ fn.call(document); }catch(e){} }
  }
  function syncImmersive(){
    var on = !!nativeFsElement() || fakeFs;
    document.body.classList.toggle("immersive", on);
    if(on) pokeChrome();
  }
  $("#fsBtn").addEventListener("click", function(){
    if(nativeFsElement()){ exitFs(); return; }
    if(fakeFs){ fakeFs = false; syncImmersive(); return; }
    if(!requestFs()){ fakeFs = true; syncImmersive(); }
  });
  document.addEventListener("fullscreenchange", syncImmersive);
  document.addEventListener("webkitfullscreenchange", syncImmersive);
  document.addEventListener("keydown", function(e){ if(e.key === "Escape" && fakeFs){ fakeFs = false; syncImmersive(); } });

  /* chrome peeks on mouse or touch — not on keys, so typing stays undisturbed */
  var chromeTimer;
  function pokeChrome(){
    document.body.classList.add("show-chrome");
    clearTimeout(chromeTimer);
    chromeTimer = setTimeout(function(){ document.body.classList.remove("show-chrome"); }, 2800);
  }
  ["mousemove","touchstart"].forEach(function(ev){
    document.addEventListener(ev, function(){ if(document.body.classList.contains("immersive")) pokeChrome(); });
  });

  /* ---- init ---- */
  grow(); count();
  window.addEventListener("resize", grow);
})();
</script>
</body>
</html>
